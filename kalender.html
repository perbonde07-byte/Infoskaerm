<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Arbejdsboard</title>

<style>
:root{
  --bg:#0d4952;
  --panel:#083d43;
  --panel2:#0b3a40;
  --panel3:#114c54;
  --ink:#e9fbff;
  --muted:#b7d6db;
  --line:#0a2b30;
}

*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:system-ui;
}

/* HEADER */
.topbar{
  position:sticky;
  top:0;
  background:var(--panel);
  padding:16px;
  z-index:10;
}

h1{
  margin:0;
  font-size:clamp(24px,3vw,40px);
}

/* MEDARBEJDERE */
.people{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:10px;
}

.people span{
  background:var(--panel3);
  padding:6px 10px;
  border-radius:20px;
}

/* IKKE FORDELT */
.queue{
  display:flex;
  gap:10px;
  overflow:auto;
  margin-top:12px;
}

/* TASK */
.task{
  min-width:clamp(160px,18vw,320px);
  max-width:clamp(220px,30vw,420px);
  padding:clamp(8px,1vw,14px);
  border-radius:12px;
  cursor:grab;
  font-weight:700;
}

.task-text{
  font-size:clamp(14px,1.4vw,22px);
}

.p1{background:#ff6666}
.p2{background:#ff9e57}
.p3{background:#7bd88f}
.p4{background:#6dbaff}
.p5{background:#bcc3ca}

/* ROWS */
.rows{
  padding:16px;
}

.row{
  display:grid;
  grid-template-columns:120px 1fr;
  gap:10px;
  margin-bottom:10px;
  background:var(--panel2);
  padding:10px;
  border-radius:10px;
}

.name{
  font-size:clamp(16px,1.8vw,26px);
  font-weight:900;
}

.lane{
  min-height:60px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}
</style>
</head>

<body>

<div class="topbar">
  <h1>ARBEJDSBOARD</h1>

  <div class="people" id="people"></div>

  <div class="queue" id="queue"></div>
</div>

<div class="rows" id="rows"></div>

<script>

let state = {
  people:["PB","LB","BH"],
  tasks:[],
  assignments:{},
  priority:{}
};

/* API */
async function loadData(){
  const r = await fetch("/api/data");
  const j = await r.json();
  return j.content;
}

async function saveData(data){
  await fetch("/api/data",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      action:"saveDataJson",
      data
    })
  });
}

async function loadICS(url){
  const r = await fetch("/api/ics?url="+encodeURIComponent(url));
  const j = await r.json();
  return j.events||[];
}

/* PARSE */
function parse(e){
  const txt = (e.summary||"") + " " + (e.description||"");
  if(!txt.includes("*")) return null;

  return {
    id: txt + e.start,
    text: txt.replace("*","").trim()
  };
}

/* RENDER */
function render(){

  const queue = document.getElementById("queue");
  const rows = document.getElementById("rows");
  const people = document.getElementById("people");

  queue.innerHTML="";
  rows.innerHTML="";
  people.innerHTML="";

  state.people.forEach(p=>{
    const chip=document.createElement("span");
    chip.textContent=p;
    people.appendChild(chip);
  });

  /* IKKE FORDELT */
  state.tasks
    .filter(t=>!state.assignments[t.id])
    .slice(0,5)
    .forEach(t=>{
      queue.appendChild(makeTask(t));
    });

  /* PERSONER */
  state.people.forEach(p=>{

    const row=document.createElement("div");
    row.className="row";

    const name=document.createElement("div");
    name.className="name";
    name.textContent=p;

    const lane=document.createElement("div");
    lane.className="lane";

    lane.ondragover=e=>e.preventDefault();
    lane.ondrop=e=>{
      const id=e.dataTransfer.getData("text");
      state.assignments[id]=p;
      save();
      render();
    };

    state.tasks
      .filter(t=>state.assignments[t.id]===p)
      .forEach(t=>{
        lane.appendChild(makeTask(t));
      });

    row.appendChild(name);
    row.appendChild(lane);

    rows.appendChild(row);
  });
}

/* TASK */
function makeTask(t){

  const el=document.createElement("div");
  el.className="task p"+(state.priority[t.id]||3);
  el.draggable=true;

  el.innerHTML=`<div class="task-text">${t.text}</div>`;

  el.onclick=()=>{
    state.priority[t.id]=(state.priority[t.id]||3)%5+1;
    save();
    render();
  };

  el.ondragstart=e=>{
    e.dataTransfer.setData("text",t.id);
  };

  return el;
}

/* SAVE (debounce) */
let timer;
function save(){
  clearTimeout(timer);
  timer=setTimeout(async()=>{
    const cfg = await loadData();
    cfg.workboard = {
      people: state.people,
      assignments: state.assignments,
      priority: state.priority
    };
    await saveData(cfg);
  },10000);
}

/* INIT */
(async function(){

  const cfg = await loadData();
  const url = cfg.calendar?.url;

  if(cfg.workboard){
    state.people = cfg.workboard.people || state.people;
    state.assignments = cfg.workboard.assignments || {};
    state.priority = cfg.workboard.priority || {};
  }

  const events = await loadICS(url);

  state.tasks = events.map(parse).filter(Boolean);

  render();

})();

</script>

</body>
</html>
