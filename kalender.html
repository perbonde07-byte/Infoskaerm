<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Arbejdsboard</title>

<style>
:root{
  --bg:#0d4952;
  --panel:#083d43;
  --panel2:#0b3a40;
  --panel3:#114c54;
  --ink:#e9fbff;
  --muted:#b7d6db;
  --line:#0a2b30;
}

*{box-sizing:border-box}
html,body{height:100%}

body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font:14px/1.3 system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
}

.wrapper{
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

.topbar{
  position:sticky;
  top:0;
  z-index:20;
  background:linear-gradient(180deg, var(--panel) 0%, var(--panel2) 100%);
  border-bottom:1px solid var(--line);
  padding:12px 14px 10px;
  box-shadow:0 8px 20px rgba(0,0,0,.18);
}

.topline{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:8px;
}

h1{
  margin:0;
  font-size:32px;
  letter-spacing:.14em;
  line-height:1;
}

.note{
  color:var(--muted);
  font-size:12px;
}

.people-admin{
  display:flex;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
  margin-bottom:8px;
}

.people-label{
  font-weight:800;
  font-size:14px;
}

.people-chip{
  display:inline-flex;
  align-items:center;
  gap:6px;
  border:1px solid var(--line);
  background:var(--panel3);
  color:var(--ink);
  border-radius:999px;
  padding:4px 8px;
  font-weight:700;
  font-size:13px;
}

.people-chip button{
  border:0;
  background:transparent;
  color:var(--ink);
  cursor:pointer;
  font-size:14px;
  line-height:1;
  padding:0 0 1px;
}

.people-admin input{
  background:var(--panel2);
  color:var(--ink);
  border:1px solid var(--line);
  border-radius:10px;
  padding:7px 10px;
  min-width:90px;
  font-size:13px;
}

.people-admin button,
.header-actions button{
  background:var(--panel3);
  color:var(--ink);
  border:1px solid var(--line);
  border-radius:10px;
  padding:7px 10px;
  cursor:pointer;
  font-weight:700;
  font-size:13px;
}

.header-actions{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  align-items:center;
  margin-bottom:8px;
}

.status{
  color:var(--muted);
  font-size:11px;
}

.queue-wrap{
  display:none;
}

.queue-wrap.show{
  display:block;
}

.queue-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:6px;
}

.queue-title{
  font-size:14px;
  font-weight:800;
  letter-spacing:.08em;
}

.queue-sub{
  color:var(--muted);
  font-size:11px;
}

.queue{
  display:flex;
  gap:8px;
  overflow:auto;
  padding-bottom:4px;
  min-height:64px;
}

.main{
  flex:1;
  min-height:0;
  overflow:auto;
  padding:10px 12px 14px;
}

.rows{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.person-row{
  display:grid;
  grid-template-columns:110px 1fr;
  gap:10px;
  align-items:start;
  background:var(--panel2);
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px;
}

.person-name{
  font-size:20px;
  font-weight:900;
  letter-spacing:.08em;
  padding-top:2px;
  display:flex;
  align-items:center;
  gap:6px;
  cursor:pointer;
  min-height:32px;
}

.person-row.is-sick{
  opacity:.72;
}

.person-row.is-off{
  opacity:.72;
}

.person-lane{
  min-height:56px;
  border:1px dashed #2e6971;
  border-radius:10px;
  padding:6px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:flex-start;
  background:rgba(255,255,255,.02);
}

.person-lane.over,
.queue.over{
  outline:2px solid #c5ecf3;
  outline-offset:2px;
}

.task{
  user-select:none;
  -webkit-user-select:none;
  min-width:170px;
  max-width:320px;
  border-radius:10px;
  border:1px solid rgba(0,0,0,.15);
  padding:8px 10px;
  color:#12252a;
  font-weight:800;
  cursor:grab;
  box-shadow:0 4px 10px rgba(0,0,0,.16);
}

.task:active{
  cursor:grabbing;
}

.task-top{
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:8px;
  margin-bottom:4px;
}

.prio{
  font-size:10px;
  font-weight:900;
  border-radius:999px;
  padding:2px 6px;
  background:rgba(255,255,255,.45);
}

.task-text{
  font-size:14px;
  line-height:1.2;
  white-space:normal;
  word-break:break-word;
}

.task.p1{ background:#ff6666; }
.task.p2{ background:#ff9e57; }
.task.p3{ background:#7bd88f; }
.task.p4{ background:#6dbaff; }
.task.p5{ background:#bcc3ca; }

.task.done{
  opacity:.48;
  text-decoration:line-through;
}

.empty{
  color:var(--muted);
  font-size:11px;
  padding:8px 2px 0;
}

.person-badge{
  font-size:10px;
  font-weight:900;
  border-radius:999px;
  padding:2px 6px;
  letter-spacing:.04em;
}

.person-badge.sick{
  background:#ff6666;
  color:#fff;
}

.person-badge.off{
  background:#949aa1;
  color:#fff;
}

/* Små skærme */
@media (max-width: 900px){
  .topbar{
    position:static; /* mobil: top går med op */
    padding:10px 12px 8px;
  }

  h1{
    font-size:26px;
  }

  .person-row{
    grid-template-columns:1fr;
    gap:6px;
  }

  .person-name{
    font-size:17px;
    padding-top:0;
  }

  .task{
    min-width:140px;
    max-width:100%;
    padding:8px 9px;
  }

  .task-text{
    font-size:13px;
  }

  .main{
    padding:8px 10px 12px;
  }
}

/* iPhone / små skærme i liggende format */
@media (max-width: 950px) and (orientation: landscape) {
  .topbar{
    position:static;
    padding:6px 10px 6px;
  }

  .topline{
    margin-bottom:6px;
    gap:6px;
  }

  h1{
    font-size:20px;
    letter-spacing:.1em;
  }

  .note{
    font-size:10px;
  }

  .people-admin{
    gap:5px;
    margin-bottom:6px;
  }

  .people-label,
  .people-chip,
  .people-admin input,
  .people-admin button,
  .header-actions button{
    font-size:11px;
  }

  .people-chip{
    padding:3px 7px;
  }

  .people-admin input{
    min-width:70px;
    padding:5px 7px;
  }

  .people-admin button,
  .header-actions button{
    padding:5px 8px;
  }

  .header-actions{
    margin-bottom:6px;
    gap:5px;
  }

  .queue{
    min-height:44px;
    gap:6px;
  }

  .queue-title{
    font-size:12px;
  }

  .queue-sub,
  .status{
    font-size:10px;
  }

  .main{
    padding:6px 8px 10px;
  }

  .rows{
    gap:6px;
  }

  .person-row{
    grid-template-columns:60px 1fr;
    gap:6px;
    padding:6px;
    border-radius:10px;
  }

  .person-name{
    font-size:13px;
    letter-spacing:.04em;
  }

  .person-lane{
    min-height:38px;
    padding:4px;
    gap:4px;
    border-radius:8px;
  }

  .task{
    min-width:110px;
    max-width:180px;
    padding:5px 7px;
    border-radius:8px;
  }

  .prio{
    font-size:9px;
    padding:1px 5px;
  }

  .task-top{
    margin-bottom:3px;
  }

  .task-text{
    font-size:10px;
    line-height:1.1;
  }
}

/* Store TV-skærme: mindre tekst og mere kompakt */
@media (min-width: 1400px){
  body{
    font-size:13px;
  }

  .topbar{
    padding:10px 14px 8px;
  }

  h1{
    font-size:28px;
  }

  .note{
    font-size:11px;
  }

  .people-label,
  .people-chip,
  .people-admin input,
  .people-admin button,
  .header-actions button{
    font-size:12px;
  }

  .people-chip{
    padding:4px 8px;
  }

  .people-admin input{
    padding:6px 8px;
    min-width:80px;
  }

  .people-admin button,
  .header-actions button{
    padding:6px 9px;
  }

  .queue-title{
    font-size:13px;
  }

  .queue-sub,
  .status{
    font-size:10px;
  }

  .main{
    padding:8px 10px 12px;
  }

  .rows{
    gap:7px;
  }

  .person-row{
    grid-template-columns:78px 1fr;
    gap:8px;
    padding:8px;
  }

  .person-name{
    font-size:16px;
  }

  .person-lane{
    min-height:48px;
    padding:5px;
    gap:6px;
  }

  .task{
    min-width:150px;
    max-width:260px;
    padding:7px 9px;
    border-radius:9px;
  }

  .prio{
    font-size:9px;
    padding:2px 5px;
  }

  .task-text{
    font-size:12px;
    line-height:1.15;
  }

  .queue{
    min-height:56px;
    gap:6px;
  }
}

/* Meget store skærme / 30"+ */
@media (min-width: 1900px){
  h1{
    font-size:24px;
  }

  .topbar{
    padding:8px 12px 7px;
  }

  .note{
    font-size:10px;
  }

  .people-chip,
  .people-admin input,
  .people-admin button,
  .header-actions button{
    font-size:11px;
  }

  .person-row{
    grid-template-columns:70px 1fr;
    padding:7px;
    gap:7px;
  }

  .person-name{
    font-size:14px;
  }

  .person-lane{
    min-height:42px;
    padding:4px;
    gap:5px;
  }

  .task{
    min-width:130px;
    max-width:220px;
    padding:6px 8px;
  }

  .task-text{
    font-size:11px;
  }

  .queue{
    min-height:50px;
  }

  .main{
    padding:7px 9px 10px;
  }
}

/* TV mode via ?tv=1 */
body.tv-mode h1{
  font-size:22px;
}

body.tv-mode .note{
  font-size:10px;
}

body.tv-mode .people-label,
body.tv-mode .people-chip,
body.tv-mode .people-admin input,
body.tv-mode .people-admin button,
body.tv-mode .header-actions button{
  font-size:11px;
}

body.tv-mode .topbar{
  padding:8px 12px 7px;
}

body.tv-mode .person-row{
  grid-template-columns:70px 1fr;
  padding:7px;
  gap:7px;
}

body.tv-mode .person-name{
  font-size:14px;
}

body.tv-mode .person-lane{
  min-height:42px;
  padding:4px;
  gap:5px;
}

body.tv-mode .task{
  min-width:130px;
  max-width:220px;
  padding:6px 8px;
}

body.tv-mode .task-text{
  font-size:11px;
}

body.tv-mode .queue{
  min-height:50px;
}
</style>
</head>
<body>
<div class="wrapper">
  <div class="topbar">
    <div class="topline">
      <h1>ARBEJDSBOARD</h1>
      <div class="note">Kun opgaver med <strong>*</strong> tages med. Træk dem ned på en medarbejder. Klik på en opgave for at skifte prioritet. Klik på medarbejdernavn for status: normal → SYG → FRI.</div>
    </div>

    <div class="people-admin">
      <span class="people-label">Medarbejdere:</span>
      <div id="peopleChips"></div>
      <input id="newPerson" type="text" maxlength="6" placeholder="fx PB">
      <button id="addPersonBtn" type="button">Tilføj</button>
    </div>

    <div class="header-actions">
      <button id="resetBtn" type="button">Nulstil dagens fordeling</button>
      <div id="statusText" class="status">Klar</div>
    </div>

    <div id="queueWrap" class="queue-wrap">
      <div class="queue-head">
        <div>
          <div class="queue-title">IKKE FORDELT I DAG</div>
          <div class="queue-sub">Viser op til 5 opgaver.</div>
        </div>
      </div>
      <div id="queue" class="queue"></div>
    </div>
  </div>

  <div class="main">
    <div id="rows" class="rows"></div>
  </div>
</div>

<script>
const DEFAULT_PEOPLE = ["BH","LB","PB"];
const SAVE_DELAY_MS = 10000;
const QUEUE_LIMIT = 5;

let state = {
  cfg: null,
  people: [...DEFAULT_PEOPLE],
  personStatus: {},
  allTasks: [],
  dayKey: "",
  saveTimer: null,
  dirty: false,
  saving: false
};

function $(sel){
  return document.querySelector(sel);
}

if (new URLSearchParams(location.search).get("tv") === "1") {
  document.body.classList.add("tv-mode");
}

function setStatus(msg){
  $("#statusText").textContent = msg;
}

async function loadData(){
  const r = await fetch("/api/data");
  const j = await r.json();
  return j.content;
}

async function saveData(cfg){
  const r = await fetch("/api/data", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      action: "saveDataJson",
      message: "Opdater workboard",
      data: cfg
    })
  });
  const j = await r.json();
  if (!j.ok) throw new Error(j.error || "Kunne ikke gemme");
  return j;
}

async function loadICS(url, days, max){
  const r = await fetch(`/api/ics?url=${encodeURIComponent(url)}&days=${days}&max=${max}`);
  const j = await r.json();
  return j.events || [];
}

function getTodayDateKey(){
  return new Date().toISOString().slice(0,10);
}

function isToday(dateStr){
  return new Date(dateStr).toISOString().slice(0,10) === getTodayDateKey();
}

function makeTaskId(e){
  return [
    e.summary || "",
    e.description || "",
    e.start || "",
    e.end || ""
  ].join("||");
}

function escapeHtml(s){
  return String(s || "").replace(/[&<>"]/g, m => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;"
  }[m]));
}

function parseEvent(e){
  const original = `${e.summary || ""} ${e.description || ""}`.trim();

  if (!original.includes("*")) return null;

  const text = original.replace(/\*/g, "").replace(/\s+/g, " ").trim();
  if (!text) return null;

  return {
    id: makeTaskId(e),
    text,
    start: new Date(e.start)
  };
}

function ensureWorkboard(){
  if (!state.cfg.workboard) state.cfg.workboard = {};
  if (!Array.isArray(state.cfg.workboard.people)) state.cfg.workboard.people = [...DEFAULT_PEOPLE];
  if (!state.cfg.workboard.personStatus || typeof state.cfg.workboard.personStatus !== "object") {
    state.cfg.workboard.personStatus = {};
  }
  if (!state.cfg.workboard.days || typeof state.cfg.workboard.days !== "object") state.cfg.workboard.days = {};
  if (!state.cfg.workboard.days[state.dayKey]) state.cfg.workboard.days[state.dayKey] = {};
}

function getTaskState(taskId){
  ensureWorkboard();
  const day = state.cfg.workboard.days[state.dayKey];
  if (!day[taskId]) {
    day[taskId] = {
      person: null,
      order: 0,
      priority: 3,
      done: false
    };
  }
  return day[taskId];
}

function scheduleSave(){
  state.dirty = true;
  setStatus("Ikke gemt…");
  clearTimeout(state.saveTimer);
  state.saveTimer = setTimeout(() => {
    persistBoard().catch(err => {
      console.error(err);
      setStatus("Gem fejlede");
    });
  }, SAVE_DELAY_MS);
}

async function persistBoard(){
  if (!state.dirty || state.saving) return;

  state.saving = true;
  setStatus("Gemmer…");

  state.cfg.workboard.people = [...state.people];
  state.cfg.workboard.personStatus = { ...state.personStatus };

  await saveData(state.cfg);

  state.dirty = false;
  state.saving = false;
  setStatus("Gemt");
}

function renderPeopleChips(){
  const root = $("#peopleChips");
  root.innerHTML = "";

  state.people.forEach(person => {
    const chip = document.createElement("span");
    chip.className = "people-chip";
    chip.innerHTML = `
      <span>${escapeHtml(person)}</span>
      <button type="button" data-remove="${escapeHtml(person)}" title="Fjern ${escapeHtml(person)}">×</button>
    `;
    root.appendChild(chip);
  });

  root.querySelectorAll("button[data-remove]").forEach(btn => {
    btn.onclick = () => removePerson(btn.dataset.remove);
  });
}

function removePerson(person){
  state.people = state.people.filter(p => p !== person);
  delete state.personStatus[person];

  const moved = [];
  state.allTasks.forEach(task => {
    const s = getTaskState(task.id);
    if (s.person === person) {
      s.person = null;
      moved.push(task.id);
    }
  });

  moved.forEach((taskId, idx) => {
    const s = getTaskState(taskId);
    s.order = -1000 + idx;
  });

  render();
  scheduleSave();
}

function addPerson(){
  const input = $("#newPerson");
  const value = input.value.trim().toUpperCase();
  if (!value) return;
  if (state.people.includes(value)) {
    input.value = "";
    return;
  }

  state.people.push(value);
  state.people.sort();
  state.personStatus[value] = "";
  input.value = "";

  render();
  scheduleSave();
}

function cyclePriority(taskId){
  const s = getTaskState(taskId);
  s.priority = s.priority >= 5 ? 1 : s.priority + 1;
  render();
  scheduleSave();
}

function cyclePersonStatus(person){
  const current = state.personStatus[person] || "";

  if (current === "") {
    state.personStatus[person] = "syg";
  } else if (current === "syg") {
    state.personStatus[person] = "fri";
  } else {
    state.personStatus[person] = "";
  }

  render();
  scheduleSave();
}

function createTaskElement(task){
  const s = getTaskState(task.id);

  const el = document.createElement("div");
  el.className = `task p${s.priority}${s.done ? " done" : ""}`;
  el.draggable = true;
  el.dataset.taskId = task.id;

  el.innerHTML = `
    <div class="task-top">
      <span class="prio">P${s.priority}</span>
    </div>
    <div class="task-text">${escapeHtml(task.text)}</div>
  `;

  el.addEventListener("dragstart", e => {
    e.dataTransfer.setData("text/plain", task.id);
  });

  el.addEventListener("click", () => {
    cyclePriority(task.id);
  });

  return el;
}

function setupDropZone(zone, personOrNull){
  zone.addEventListener("dragover", e => {
    e.preventDefault();
    zone.classList.add("over");
  });

  zone.addEventListener("dragleave", () => {
    zone.classList.remove("over");
  });

  zone.addEventListener("drop", e => {
    e.preventDefault();
    zone.classList.remove("over");
    const taskId = e.dataTransfer.getData("text/plain");
    if (!taskId) return;

    const s = getTaskState(taskId);
    s.person = personOrNull;

    if (personOrNull === null) {
      const currentOrders = state.allTasks
        .map(t => getTaskState(t.id).order)
        .filter(n => Number.isFinite(n));
      const minOrder = currentOrders.length ? Math.min(...currentOrders) : 0;
      s.order = minOrder - 1;
    } else {
      const samePersonOrders = state.allTasks
        .filter(t => getTaskState(t.id).person === personOrNull)
        .map(t => getTaskState(t.id).order)
        .filter(n => Number.isFinite(n));
      const maxOrder = samePersonOrders.length ? Math.max(...samePersonOrders) : 0;
      s.order = maxOrder + 1;
    }

    render();
    scheduleSave();
  });
}

function getUnassignedTasks(){
  return state.allTasks
    .filter(task => getTaskState(task.id).person === null)
    .sort((a,b) => {
      const sa = getTaskState(a.id);
      const sb = getTaskState(b.id);

      if (sa.order !== sb.order) return sa.order - sb.order;
      if (sa.priority !== sb.priority) return sa.priority - sb.priority;
      return a.start - b.start;
    });
}

function renderQueue(){
  const wrap = $("#queueWrap");
  const queue = $("#queue");
  queue.innerHTML = "";

  const unassigned = getUnassignedTasks();

  if (!unassigned.length) {
    wrap.classList.remove("show");
    return;
  }

  wrap.classList.add("show");

  unassigned.slice(0, QUEUE_LIMIT).forEach(task => {
    queue.appendChild(createTaskElement(task));
  });

  setupDropZone(queue, null);
}

function renderRows(){
  const rows = $("#rows");
  rows.innerHTML = "";

  state.people.forEach(person => {
    const row = document.createElement("div");
    row.className = "person-row";

    const pStatus = state.personStatus[person] || "";
    if (pStatus === "syg") row.classList.add("is-sick");
    if (pStatus === "fri") row.classList.add("is-off");

    const name = document.createElement("div");
    name.className = "person-name";

    let badge = "";
    if (pStatus === "syg") badge = `<span class="person-badge sick">SYG</span>`;
    if (pStatus === "fri") badge = `<span class="person-badge off">FRI</span>`;

    name.innerHTML = `${escapeHtml(person)} ${badge}`;
    name.onclick = () => cyclePersonStatus(person);

    const lane = document.createElement("div");
    lane.className = "person-lane";

    const tasks = state.allTasks
      .filter(task => getTaskState(task.id).person === person)
      .sort((a,b) => {
        const sa = getTaskState(a.id);
        const sb = getTaskState(b.id);

        if (sa.order !== sb.order) return sa.order - sb.order;
        if (sa.priority !== sb.priority) return sa.priority - sb.priority;
        return a.start - b.start;
      });

    if (!tasks.length) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "Slip opgaver her";
      lane.appendChild(empty);
    } else {
      tasks.forEach(task => {
        lane.appendChild(createTaskElement(task));
      });
    }

    setupDropZone(lane, person);

    row.appendChild(name);
    row.appendChild(lane);
    rows.appendChild(row);
  });
}

function render(){
  renderPeopleChips();
  renderQueue();
  renderRows();
}

function resetBoard(){
  state.allTasks.forEach((task, idx) => {
    const s = getTaskState(task.id);
    s.person = null;
    s.order = idx;
    s.priority = 3;
    s.done = false;
  });
  render();
  scheduleSave();
}

async function init(){
  state.cfg = await loadData();
  const url = state.cfg.calendar?.url || "";
  const days = Number(state.cfg.calendar?.daysAhead || 1);
  const max = Number(state.cfg.calendar?.maxEvents || 50);

  state.dayKey = getTodayDateKey();

  if (!url) {
    $("#rows").innerHTML = `<div class="empty">Ingen ICS-URL fundet.</div>`;
    return;
  }

  const events = await loadICS(url, days, max);

  state.allTasks = events
    .filter(e => isToday(e.start))
    .map(parseEvent)
    .filter(Boolean)
    .sort((a,b) => a.start - b.start);

  ensureWorkboard();

  state.people = [...state.cfg.workboard.people];
  state.personStatus = { ...(state.cfg.workboard.personStatus || {}) };

  state.allTasks.forEach((task, idx) => {
    const s = getTaskState(task.id);
    if (!Number.isFinite(s.order)) s.order = idx;
    if (!("priority" in s)) s.priority = 3;
    if (!("done" in s)) s.done = false;
    if (!("person" in s)) s.person = null;
  });

  $("#addPersonBtn").onclick = addPerson;
  $("#newPerson").addEventListener("keydown", e => {
    if (e.key === "Enter") addPerson();
  });
  $("#resetBtn").onclick = resetBoard;

  render();
  setStatus("Klar");
}

init().catch(err => {
  console.error(err);
  setStatus("Fejl ved indlæsning");
});
</script>
</body>
</html>
