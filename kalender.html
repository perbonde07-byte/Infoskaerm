<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gantt</title>

<style>
:root{
  --bg:#0d4952;
  --panel:#083d43;
  --ink:#e9fbff;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:sans-serif;
}

.frame{
  padding:20px;
}

h1{
  font-size:40px;
}

.card{
  background:#092f36;
  border-radius:12px;
  padding:10px;
  margin-bottom:15px;
}

.date{
  font-weight:bold;
  margin-bottom:8px;
  font-size:20px;
}

.row{
  margin-bottom:6px;
}

.bar{
  padding:6px 10px;
  border-radius:6px;
  display:inline-block;
}
</style>
</head>

<body>

<div class="frame">
  <h1>PLAN</h1>
  <div id="grid"></div>
</div>

<script>

const $ = s=>document.querySelector(s);

async function loadData(){
  const r = await fetch("/api/data");
  const j = await r.json();
  return j.content;
}

async function loadICS(url, days, max){
  const u = `/api/ics?url=${encodeURIComponent(url)}&days=${days}&max=${max}`;
  const r = await fetch(u);
  const j = await r.json();
  return j.events||[];
}

/* ---------------- PARSE ---------------- */

function parseEvent(e){
  const text = (e.summary || "").toUpperCase();
  const parts = text.split(" ");

  const person = parts[0] || "UKENDT";

  let priority = 3;
  if (text.includes("P1")) priority = 1;
  else if (text.includes("P2")) priority = 2;

  const done = text.includes("FÆRDIG");

  const cleanText = (e.summary || "")
    .replace(/^([A-Z]{1,3})\s*/i, "")
    .replace(/P[1-3]/i, "")
    .replace(/FÆRDIG/i, "")
    .trim();

  return {
    person,
    priority,
    done,
    text: cleanText,
    start: new Date(e.start),
    end: new Date(e.end)
  };
}

/* ---------------- RENDER ---------------- */

function renderEvents(raw){

  const g = $("#grid");
  g.innerHTML = "";

  const parsed = raw.map(parseEvent);

  const map = {};

  parsed.forEach(e=>{
    if(!map[e.person]) map[e.person] = [];
    map[e.person].push(e);
  });

  Object.values(map).forEach(list=>{
    list.sort((a,b)=>a.start-b.start);
  });

  Object.keys(map).sort().forEach(person=>{

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `<div class="date">${person}</div>`;

    map[person].forEach(e=>{

      const row = document.createElement("div");
      row.className = "row";

      let color = "#4caf50";
      if(e.priority === 1) color = "#ff4d4d";
      else if(e.priority === 2) color = "#ffd24d";

      const bar = document.createElement("div");
      bar.className = "bar";

      bar.style.background = color;
      bar.style.opacity = e.done ? 0.4 : 1;
      bar.style.textDecoration = e.done ? "line-through" : "none";

      bar.textContent = e.text;

      row.appendChild(bar);
      card.appendChild(row);
    });

    g.appendChild(card);
  });

  if(!raw.length){
    g.innerHTML = "Ingen data";
  }
}

/* ---------------- INIT ---------------- */

(async function(){

  const cfg = await loadData();

  const url = cfg.calendar?.url || "";
  const days = Number(cfg.calendar?.daysAhead || 60);
  const max  = Number(cfg.calendar?.maxEvents || 50);

  if(url){
    const ev = await loadICS(url, days, max);
    renderEvents(ev);
  }

})();
</script>

</body>
</html>
