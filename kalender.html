<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Plan</title>

<style>
:root{
  --bg:#0d4952;
  --panel:#083d43;
  --ink:#e9fbff;
  --card:#0b3a40;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:system-ui,Segoe UI,Roboto;
}

/* Layout */
.wrapper{
  padding:20px;
}

h1{
  font-size:42px;
  letter-spacing:.2em;
  margin-bottom:20px;
}

/* GRID = mange personer på én skærm */
#grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap:14px;
}

/* PERSON CARD */
.card{
  background:var(--card);
  border-radius:14px;
  padding:10px;
}

/* NAVN */
.name{
  font-weight:700;
  margin-bottom:8px;
  font-size:16px;
  letter-spacing:.1em;
}

/* OPGAVER LIGGER PÅ LINJE */
.row{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}

/* OPGAVE BOX */
.bar{
  padding:6px 10px;
  border-radius:6px;
  font-size:12px;
  font-weight:600;
  white-space:nowrap;
}
</style>
</head>

<body>

<div class="wrapper">
  <h1>PLAN</h1>
  <div id="grid"></div>
</div>

<script>

const $ = s=>document.querySelector(s);

/* ---------------- API ---------------- */

async function loadData(){
  const r = await fetch("/api/data");
  const j = await r.json();
  return j.content;
}

async function loadICS(url, days, max){
  const u = `/api/ics?url=${encodeURIComponent(url)}&days=${days}&max=${max}`;
  const r = await fetch(u);
  const j = await r.json();
  return j.events||[];
}

/* ---------------- PARSE ---------------- */

function parseEvent(e){

  const original = e.summary || "";

  // ⭐ KUN vis hvis der er *
  if (!original.includes("*")) return null;

  const text = original.toUpperCase();
  const parts = text.split(" ");

  const person = parts[0] || "UKENDT";

  let priority = 3;
  if (text.includes("P1")) priority = 1;
  else if (text.includes("P2")) priority = 2;

  const done = text.includes("FÆRDIG");

  const cleanText = original
    .replace(/^([A-Z]{1,3})\s*/i, "")
    .replace("*", "")
    .replace(/P[1-3]/i, "")
    .replace(/FÆRDIG/i, "")
    .trim();

  return {
    person,
    priority,
    done,
    text: cleanText,
    start: new Date(e.start)
  };
}

/* ---------------- RENDER ---------------- */

function renderEvents(raw){

  const g = $("#grid");
  g.innerHTML = "";

  const parsed = raw.map(parseEvent).filter(Boolean);

  const map = {};

  parsed.forEach(e=>{
    if(!map[e.person]) map[e.person] = [];
    map[e.person].push(e);
  });

  Object.values(map).forEach(list=>{
    list.sort((a,b)=>a.start-b.start);
  });

  Object.keys(map).sort().forEach(person=>{

    const card = document.createElement("div");
    card.className = "card";

    const name = document.createElement("div");
    name.className = "name";
    name.textContent = person;

    const row = document.createElement("div");
    row.className = "row";

    map[person].forEach(e=>{

      let color = "#4caf50"; // normal
      if(e.priority === 1) color = "#ff4d4d"; // vigtig
      else if(e.priority === 2) color = "#ffd24d"; // medium

      const bar = document.createElement("div");
      bar.className = "bar";

      bar.style.background = color;
      bar.style.opacity = e.done ? 0.4 : 1;
      bar.style.textDecoration = e.done ? "line-through" : "none";

      bar.textContent = e.text;

      row.appendChild(bar);
    });

    card.appendChild(name);
    card.appendChild(row);

    g.appendChild(card);
  });

  if(!parsed.length){
    g.innerHTML = "<div>Ingen planlagte opgaver</div>";
  }
}

/* ---------------- INIT ---------------- */

(async function(){

  const cfg = await loadData();

  const url = cfg.calendar?.url || "";
  const days = Number(cfg.calendar?.daysAhead || 60);
  const max  = Number(cfg.calendar?.maxEvents || 50);

  if(url){
    const ev = await loadICS(url, days, max);
    renderEvents(ev);
  }

})();
</script>

</body>
</html>
