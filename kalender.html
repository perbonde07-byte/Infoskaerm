<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Plan</title>

<style>
:root{
  --bg:#0d4952;
  --card:#0b3a40;
  --line:#0a2b30;
  --ink:#e9fbff;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:system-ui;
}

.wrapper{
  padding:20px;
}

h1{
  font-size:42px;
  letter-spacing:.2em;
  margin-bottom:20px;
}

#grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap:14px;
}

.card{
  background:var(--card);
  border-radius:14px;
  padding:12px;
  border:1px solid var(--line);
}

.name{
  font-weight:800;
  margin-bottom:10px;
  letter-spacing:.1em;
}

.row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.bar{
  padding:8px 12px;
  border-radius:10px;
  font-size:13px;
  font-weight:700;
  line-height:1.2;
  white-space:normal;
}

/* farver */
.p1{ background:#ff4d4d; }
.p2{ background:#ff944d; }
.p3{ background:#4caf50; }
.p4{ background:#3fa7ff; }
.p5{ background:#999; }

.done{
  opacity:.4;
  text-decoration:line-through;
}

.empty{
  opacity:.7;
}
</style>
</head>

<body>

<div class="wrapper">
  <h1>PLAN</h1>
  <div id="grid"></div>
</div>

<script>

const $ = s=>document.querySelector(s);

async function loadData(){
  const r = await fetch("/api/data");
  const j = await r.json();
  return j.content;
}

async function loadICS(url, days, max){
  const r = await fetch(`/api/ics?url=${encodeURIComponent(url)}&days=${days}&max=${max}`);
  const j = await r.json();
  return j.events || [];
}

/* 🔥 PARSER */
function parseEvent(e){

  const original = `${e.summary || ""} ${e.description || ""}`.trim();

  const persons = (original.match(/([A-ZÆØÅ]{2,})\*/gi) || [])
    .map(p => p.replace("*","").toUpperCase());

  if (!persons.length) return null;

  const prioMatch = original.match(/\bP([1-5])\b/i);
  const priority = prioMatch ? Number(prioMatch[1]) : 3;

  const done = original.toUpperCase().includes("FÆRDIG");

  const text = original
    .replace(/([A-ZÆØÅ]{2,})\*/gi, "")
    .replace(/\bP[1-5]\b/gi, "")
    .replace(/FÆRDIG/i, "")
    .trim();

  return persons.map(person => ({
    person,
    text: text || "(ingen tekst)",
    priority,
    done,
    start: new Date(e.start)
  }));
}

/* 🔥 RENDER */
function render(events){

  const g = $("#grid");
  g.innerHTML = "";

  const parsed = events
    .map(parseEvent)
    .filter(Boolean)
    .flat();

  if (!parsed.length){
    g.innerHTML = `<div class="empty">Ingen opgaver</div>`;
    return;
  }

  // sorter efter tid
  parsed.sort((a,b)=>a.start-b.start);

  const map = {};

  parsed.forEach(e=>{
    if(!map[e.person]) map[e.person] = [];
    map[e.person].push(e);
  });

  Object.keys(map).sort().forEach(person=>{

    const card = document.createElement("div");
    card.className = "card";

    const name = document.createElement("div");
    name.className = "name";
    name.textContent = person;

    const row = document.createElement("div");
    row.className = "row";

    map[person].forEach(e=>{
      const bar = document.createElement("div");
      bar.className = `bar p${e.priority}${e.done ? " done":""}`;
      bar.textContent = e.text;
      row.appendChild(bar);
    });

    card.appendChild(name);
    card.appendChild(row);
    g.appendChild(card);
  });
}

/* INIT */
(async function(){

  const cfg = await loadData();

  const url = cfg.calendar?.url || "";
  const days = Number(cfg.calendar?.daysAhead || 60);
  const max  = Number(cfg.calendar?.maxEvents || 50);

  if(url){
    const ev = await loadICS(url, days, max);
    render(ev);
  }

})();
</script>

</body>
</html>
