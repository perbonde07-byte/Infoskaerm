<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Plan</title>

<style>
:root{
  --bg:#0d4952;
  --panel:#083d43;
  --row:#0b3a40;
  --ink:#e9fbff;
  --line:#0a2b30;
  --namew:120px;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background:var(--bg);
  color:var(--ink);
  font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;
}

.wrapper{
  padding:20px;
}

h1{
  font-size:42px;
  letter-spacing:.2em;
  margin-bottom:18px;
}

#grid{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.person-row{
  display:grid;
  grid-template-columns: var(--namew) 1fr;
  gap:12px;
  align-items:start;
  background:var(--row);
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
}

.name{
  font-weight:800;
  font-size:18px;
  letter-spacing:.08em;
  padding-top:6px;
}

.tasks{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:flex-start;
  min-width:0;
}

.task{
  padding:10px 14px;
  border-radius:10px;
  font-size:14px;
  font-weight:700;
  line-height:1.2;
  white-space:normal;
  word-break:break-word;
  max-width:420px;
  color:#102326;
}

/* Prioritet */
.p1{ background:#ff4d4d; }
.p2{ background:#ff944d; }
.p3{ background:#4caf50; }
.p4{ background:#3fa7ff; }
.p5{ background:#999; }

.done{
  opacity:.45;
  text-decoration:line-through;
}

.empty{
  opacity:.75;
  padding:12px;
  background:var(--row);
  border-radius:12px;
  border:1px solid var(--line);
}

@media (max-width:900px){
  :root{ --namew:90px; }
  .task{ max-width:100%; font-size:13px; }
}
</style>
</head>
<body>

<div class="wrapper">
  <h1>PLAN</h1>
  <div id="grid"></div>
</div>

<script>
const $ = s => document.querySelector(s);

async function loadData(){
  const r = await fetch("/api/data");
  const j = await r.json();
  return j.content;
}

async function loadICS(url, days, max){
  const r = await fetch(`/api/ics?url=${encodeURIComponent(url)}&days=${days}&max=${max}`);
  const j = await r.json();
  return j.events || [];
}

function parseEvent(e){
  const original = `${e.summary || ""} ${e.description || ""}`.trim();

  const persons = (original.match(/([A-ZÆØÅ]{2,})\*/gi) || [])
    .map(p => p.replace("*","").toUpperCase());

  if (!persons.length) return null;

  const prioMatch = original.match(/\bP([1-5])\b/i);
  const priority = prioMatch ? Number(prioMatch[1]) : 3;

  const done = /\bFÆRDIG\b/i.test(original);

  const text = original
    .replace(/([A-ZÆØÅ]{2,})\*/gi, "")
    .replace(/\bP[1-5]\b/gi, "")
    .replace(/\bFÆRDIG\b/gi, "")
    .replace(/\s+/g, " ")
    .trim();

  return persons.map(person => ({
    person,
    text: text || "(ingen tekst)",
    priority,
    done,
    start: new Date(e.start)
  }));
}

function render(events){
  const root = $("#grid");
  root.innerHTML = "";

  const parsed = events
    .map(parseEvent)
    .filter(Boolean)
    .flat();

  if (!parsed.length){
    root.innerHTML = `<div class="empty">Ingen opgaver</div>`;
    return;
  }

  parsed.sort((a,b) => a.start - b.start);

  const map = {};
  parsed.forEach(e => {
    if (!map[e.person]) map[e.person] = [];
    map[e.person].push(e);
  });

  Object.keys(map).sort().forEach(person => {
    const row = document.createElement("div");
    row.className = "person-row";

    const name = document.createElement("div");
    name.className = "name";
    name.textContent = person;

    const tasks = document.createElement("div");
    tasks.className = "tasks";

    map[person].forEach(e => {
      const t = document.createElement("div");
      t.className = `task p${e.priority}${e.done ? " done" : ""}`;
      t.textContent = e.text;
      tasks.appendChild(t);
    });

    row.appendChild(name);
    row.appendChild(tasks);
    root.appendChild(row);
  });
}

(async function(){
  const cfg = await loadData();
  const url = cfg.calendar?.url || "";
  const days = Number(cfg.calendar?.daysAhead || 60);
  const max = Number(cfg.calendar?.maxEvents || 50);

  if (!url){
    $("#grid").innerHTML = `<div class="empty">Ingen ICS-URL fundet</div>`;
    return;
  }

  const ev = await loadICS(url, days, max);
  render(ev);
})();
</script>

</body>
</html>
