<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Arbejdsboard</title>

<style>
:root{
  --bg:#0d4952;
  --panel:#083d43;
  --panel2:#0b3a40;
  --panel3:#0f4a53;
  --ink:#e9fbff;
  --muted:#b7d6db;
  --line:#0a2b30;
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font:16px/1.35 system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
}

.wrapper{
  height:100vh;
  display:flex;
  flex-direction:column;
  min-height:0;
}

.topbar{
  position:sticky;
  top:0;
  z-index:20;
  background:linear-gradient(180deg, var(--panel) 0%, var(--panel2) 100%);
  border-bottom:1px solid var(--line);
  padding:14px 16px 12px;
  box-shadow:0 8px 20px rgba(0,0,0,.18);
}

.topline{
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

h1{
  margin:0;
  font-size:clamp(26px,3.3vw,42px);
  letter-spacing:.18em;
}

.note{
  color:var(--muted);
  font-size:13px;
}

.people-admin{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.people-chip{
  display:inline-flex;
  align-items:center;
  gap:6px;
  border:1px solid var(--line);
  background:#114c54;
  color:var(--ink);
  border-radius:999px;
  padding:6px 10px;
  font-weight:700;
}

.people-chip button{
  border:0;
  background:transparent;
  color:var(--ink);
  cursor:pointer;
  font-size:15px;
  line-height:1;
  padding:0 0 1px;
}

.people-admin input{
  background:#0b3a40;
  color:var(--ink);
  border:1px solid var(--line);
  border-radius:10px;
  padding:9px 10px;
  min-width:110px;
}

.people-admin button,
.header-actions button,
.empty-btn{
  background:#114c54;
  color:var(--ink);
  border:1px solid var(--line);
  border-radius:10px;
  padding:9px 12px;
  cursor:pointer;
  font-weight:700;
}

.header-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.queue-wrap{
  display:none;
}

.queue-wrap.show{
  display:block;
}

.queue-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:8px;
}

.queue-title{
  font-size:15px;
  font-weight:800;
  letter-spacing:.08em;
}

.queue-sub{
  color:var(--muted);
  font-size:12px;
}

.queue{
  display:flex;
  gap:10px;
  overflow:auto;
  padding-bottom:4px;
}

.task{
  user-select:none;
  -webkit-user-select:none;
  touch-action:none;
  min-width:220px;
  max-width:320px;
  border-radius:12px;
  border:1px solid rgba(0,0,0,.15);
  padding:10px 12px;
  color:#12252a;
  font-weight:800;
  cursor:grab;
  box-shadow:0 4px 10px rgba(0,0,0,.16);
}

.task:active{
  cursor:grabbing;
}

.task .task-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:6px;
}

.task .prio{
  font-size:12px;
  font-weight:900;
  border-radius:999px;
  padding:3px 7px;
  background:rgba(255,255,255,.45);
}

.task .task-text{
  font-size:14px;
  line-height:1.25;
  white-space:normal;
  word-break:break-word;
}

.task.p1{ background:#ff6666; }
.task.p2{ background:#ff9e57; }
.task.p3{ background:#7bd88f; }
.task.p4{ background:#6dbaff; }
.task.p5{ background:#bcc3ca; }

.task.done{
  opacity:.48;
  text-decoration:line-through;
}

.main{
  flex:1;
  min-height:0;
  overflow:auto;
  padding:14px 16px 18px;
}

.rows{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.person-row{
  display:grid;
  grid-template-columns:110px 1fr;
  gap:12px;
  align-items:start;
  background:var(--panel2);
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
}

.person-name{
  font-size:20px;
  font-weight:900;
  letter-spacing:.08em;
  padding-top:4px;
}

.person-lane{
  min-height:64px;
  border:1px dashed #2e6971;
  border-radius:12px;
  padding:8px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:flex-start;
  background:rgba(255,255,255,.02);
}

.person-lane.over,
.queue.over{
  outline:2px solid #c5ecf3;
  outline-offset:2px;
}

.empty{
  color:var(--muted);
  font-size:13px;
  padding:10px 2px 0;
}

.status{
  color:var(--muted);
  font-size:12px;
}

.hidden{
  display:none !important;
}

@media (max-width:900px){
  .person-row{
    grid-template-columns:88px 1fr;
  }
  .person-name{
    font-size:16px;
  }
  .task{
    min-width:180px;
    max-width:260px;
  }
}
</style>
</head>
<body>
<div class="wrapper">
  <div class="topbar">
    <div class="topline">
      <h1>ARBEJDSBOARD</h1>
      <div class="note">Træk opgaver fra toppen ned på en medarbejder. Klik på en opgave for at skifte prioritet.</div>
    </div>

    <div class="people-admin">
      <strong>Medarbejdere:</strong>
      <div id="peopleChips"></div>
      <input id="newPerson" type="text" maxlength="6" placeholder="fx PB">
      <button id="addPersonBtn" type="button">Tilføj</button>
    </div>

    <div class="header-actions">
      <button id="resetBtn" type="button">Nulstil fordeling</button>
      <div class="status" id="statusText">Testversion: ændringer gemmes ikke permanent endnu.</div>
    </div>

    <div id="queueWrap" class="queue-wrap">
      <div class="queue-head">
        <div>
          <div class="queue-title">IKKE FORDELT I DAG</div>
          <div class="queue-sub">Viser op til 5 opgaver. Nye opgaver dukker op her.</div>
        </div>
      </div>
      <div id="queue" class="queue"></div>
    </div>
  </div>

  <div class="main">
    <div id="rows" class="rows"></div>
  </div>
</div>

<script>
const DEFAULT_PEOPLE = ["BH","LB","PB"];

let state = {
  people: [...DEFAULT_PEOPLE],
  allTasks: [],
  assignments: {}, // taskId -> person | null
  order: {}        // taskId -> number
};

async function loadData(){
  const r = await fetch("/api/data");
  const j = await r.json();
  return j.content;
}

async function loadICS(url, days, max){
  const r = await fetch(`/api/ics?url=${encodeURIComponent(url)}&days=${days}&max=${max}`);
  const j = await r.json();
  return j.events || [];
}

function makeTaskId(e){
  return [
    e.summary || "",
    e.description || "",
    e.start || "",
    e.end || ""
  ].join("||");
}

function todayKey(){
  const d = new Date();
  d.setHours(0,0,0,0);
  return d.getTime();
}

function isToday(dateStr){
  const d = new Date(dateStr);
  d.setHours(0,0,0,0);
  return d.getTime() === todayKey();
}

function parseEvent(e){
  const original = `${e.summary || ""} ${e.description || ""}`.trim();

  // kun opgaver med *
  if (!original.includes("*")) return null;

  const text = original
    .replace(/\*/g, "")
    .replace(/\s+/g, " ")
    .trim();

  if (!text) return null;

  return {
    id: makeTaskId(e),
    text,
    priority: 3,
    done: false,
    start: new Date(e.start),
    startRaw: e.start
  };
}

function taskClass(t){
  return `task p${t.priority}${t.done ? " done" : ""}`;
}

function cyclePriority(taskId){
  const task = state.allTasks.find(t => t.id === taskId);
  if (!task) return;
  task.priority = task.priority >= 5 ? 1 : task.priority + 1;
  render();
}

function renderPeopleChips(){
  const root = document.getElementById("peopleChips");
  root.innerHTML = "";

  state.people.forEach(person => {
    const chip = document.createElement("span");
    chip.className = "people-chip";
    chip.innerHTML = `
      <span>${person}</span>
      <button type="button" data-remove="${person}" title="Fjern ${person}">×</button>
    `;
    root.appendChild(chip);
  });

  root.querySelectorAll("button[data-remove]").forEach(btn => {
    btn.onclick = () => removePerson(btn.dataset.remove);
  });
}

function removePerson(person){
  state.people = state.people.filter(p => p !== person);

  // opgaver tilbage i køen og forrest
  const returned = [];
  Object.keys(state.assignments).forEach(taskId => {
    if (state.assignments[taskId] === person) {
      state.assignments[taskId] = null;
      returned.push(taskId);
    }
  });

  // læg returnerede opgaver forrest
  const now = Date.now();
  returned.forEach((taskId, i) => {
    state.order[taskId] = -1000 + i - now / 1000000000;
  });

  render();
}

function addPerson(){
  const input = document.getElementById("newPerson");
  const value = input.value.trim().toUpperCase();

  if (!value) return;
  if (state.people.includes(value)) {
    input.value = "";
    return;
  }

  state.people.push(value);
  state.people.sort();
  input.value = "";
  render();
}

function createTaskElement(task){
  const el = document.createElement("div");
  el.className = taskClass(task);
  el.draggable = true;
  el.dataset.taskId = task.id;

  el.innerHTML = `
    <div class="task-top">
      <span class="prio">P${task.priority}</span>
      <span>${task.start.toLocaleTimeString("da-DK", { hour: "2-digit", minute: "2-digit" })}</span>
    </div>
    <div class="task-text">${escapeHtml(task.text)}</div>
  `;

  el.addEventListener("dragstart", e => {
    e.dataTransfer.setData("text/plain", task.id);
  });

  el.addEventListener("click", () => cyclePriority(task.id));

  return el;
}

function setupDropZone(zone, personOrNull){
  zone.addEventListener("dragover", e => {
    e.preventDefault();
    zone.classList.add("over");
  });

  zone.addEventListener("dragleave", () => {
    zone.classList.remove("over");
  });

  zone.addEventListener("drop", e => {
    e.preventDefault();
    zone.classList.remove("over");
    const taskId = e.dataTransfer.getData("text/plain");
    if (!taskId) return;

    state.assignments[taskId] = personOrNull;

    // rækkefølge: læg bagest på person, forrest i kø hvis null
    if (personOrNull === null) {
      state.order[taskId] = Math.min(...Object.values(state.order), 0) - 1;
    } else {
      const maxOrder = Math.max(
        0,
        ...Object.keys(state.assignments)
          .filter(id => state.assignments[id] === personOrNull)
          .map(id => state.order[id] ?? 0)
      );
      state.order[taskId] = maxOrder + 1;
    }

    render();
  });
}

function renderQueue(){
  const wrap = document.getElementById("queueWrap");
  const queue = document.getElementById("queue");
  queue.innerHTML = "";

  const unassigned = state.allTasks
    .filter(t => (state.assignments[t.id] ?? null) === null)
    .sort((a,b) => {
      const ao = state.order[a.id] ?? 0;
      const bo = state.order[b.id] ?? 0;
      if (ao !== bo) return ao - bo;
      return a.start - b.start;
    });

  if (!unassigned.length) {
    wrap.classList.remove("show");
    return;
  }

  wrap.classList.add("show");

  unassigned.slice(0, 5).forEach(task => {
    queue.appendChild(createTaskElement(task));
  });

  setupDropZone(queue, null);
}

function renderRows(){
  const rows = document.getElementById("rows");
  rows.innerHTML = "";

  state.people.forEach(person => {
    const row = document.createElement("div");
    row.className = "person-row";

    const name = document.createElement("div");
    name.className = "person-name";
    name.textContent = person;

    const lane = document.createElement("div");
    lane.className = "person-lane";

    const tasks = state.allTasks
      .filter(t => state.assignments[t.id] === person)
      .sort((a,b) => {
        const ao = state.order[a.id] ?? 0;
        const bo = state.order[b.id] ?? 0;
        if (ao !== bo) return ao - bo;
        return a.start - b.start;
      });

    if (!tasks.length) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "Slip opgaver her";
      lane.appendChild(empty);
    } else {
      tasks.forEach(task => lane.appendChild(createTaskElement(task)));
    }

    setupDropZone(lane, person);

    row.appendChild(name);
    row.appendChild(lane);
    rows.appendChild(row);
  });
}

function render(){
  renderPeopleChips();
  renderQueue();
  renderRows();
}

function escapeHtml(s){
  return String(s || "").replace(/[&<>"]/g, m => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;"
  }[m]));
}

function resetBoard(){
  state.allTasks.forEach((t, i) => {
    state.assignments[t.id] = null;
    state.order[t.id] = i;
  });
  render();
}

async function init(){
  const cfg = await loadData();
  const url = cfg.calendar?.url || "";
  const days = Number(cfg.calendar?.daysAhead || 1);
  const max = Number(cfg.calendar?.maxEvents || 50);

  if (!url) {
    document.getElementById("rows").innerHTML = `<div class="empty">Ingen ICS-URL fundet.</div>`;
    return;
  }

  const events = await loadICS(url, days, max);

  state.allTasks = events
    .filter(e => isToday(e.start))
    .map(parseEvent)
    .filter(Boolean);

  state.allTasks.sort((a,b) => a.start - b.start);

  state.allTasks.forEach((task, i) => {
    state.assignments[task.id] = null;
    state.order[task.id] = i;
  });

  document.getElementById("addPersonBtn").onclick = addPerson;
  document.getElementById("newPerson").addEventListener("keydown", e => {
    if (e.key === "Enter") addPerson();
  });
  document.getElementById("resetBtn").onclick = resetBoard;

  render();
}

init();
</script>
</body>
</html>
